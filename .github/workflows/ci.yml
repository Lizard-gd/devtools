name: Java CI with Checkstyle and JaCoCo Tests

on: 
  push: 
    branches: 
      - master 
      - 'feature/**'
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Make gradlew executable
        run: chmod +x gradlew
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'
      
      - name: Run Checkstyle
        run: ./gradlew --no-daemon checkstyleMain
      
      - name: Run tests
        run: ./gradlew --no-daemon test
      
      - name: Ganerate JaCoCo report
        run: ./gradlew --no-daemon jacocoTestReport
    
      - name: Verify coverage
        run: ./gradlew --no-daemon jacocoTestCoverageVerification
    
      - name: Build project
        run: ./gradlew --no-daemon build
